<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#210507"/>
      <stop offset="60%" stop-color="#120303"/>
      <stop offset="100%" stop-color="#090202"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8c97a"/>
      <stop offset="100%" stop-color="#a07830"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="120" fill="url(#bg)"/>

  <circle cx="256" cy="256" r="168" fill="none" stroke="url(#ring)" stroke-width="16"/>
  <circle cx="256" cy="256" r="130" fill="none" stroke="#c9a84c" stroke-opacity="0.35" stroke-width="4"/>

  <text x="186" y="304" font-size="168" font-family="Georgia, 'Times New Roman', serif" fill="#f5ecd7">N</text>
  <text x="268" y="300" font-size="88" font-family="Georgia, 'Times New Roman', serif" fill="#c9a84c">&amp;</text>
  <text x="318" y="304" font-size="168" font-family="Georgia, 'Times New Roman', serif" fill="#f5ecd7">P</text>

  <text x="256" y="360" font-size="24" font-family="Arial, sans-serif" letter-spacing="5" text-anchor="middle" fill="#e8c97a">WEDDING</text>

  <circle cx="152" cy="132" r="4" fill="#c9a84c" filter="url(#glow)"/>
  <circle cx="382" cy="154" r="3" fill="#c9a84c" filter="url(#glow)"/>
  <circle cx="372" cy="374" r="4" fill="#c9a84c" filter="url(#glow)"/>
  <circle cx="132" cy="352" r="3" fill="#c9a84c" filter="url(#glow)"/>
</svg>
